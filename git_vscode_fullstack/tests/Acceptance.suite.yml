# Codeception Acceptance Test Suite Configuration
#
# Perform tests in a browser by either emulating one using PhpBrowser, or in a real browser using WebDriver.
# If you need both WebDriver and PhpBrowser tests, create a separate suite for each.

#actor: AcceptanceTester
#modules:
#    enabled:
#        - PhpBrowser:
#            url: http://localhost/myapp
# Add Codeception\Step\Retry trait to AcceptanceTester to enable retries
#step_decorators:
#    - Codeception\Step\ConditionalAssertion
#    - Codeception\Step\TryTo
#    - Codeception\Step\Retry

actor: AcceptanceTester
modules:
  enabled:
    - WebDriver:
        url: 'http://localhost:8000' # Your local or hosted app URL
        browser: chrome
        port: 9515
        window_size: 1280x800
        capabilities:
          goog:chromeOptions:
            args: ["--headless"] # Optional for headless mode
    - Db:
        dsn: 'mysql:host=localhost;dbname=ecommerce_db'
        user: 'root'
        password: ''
        dump: tests/_data/dump.sql
        populate: true
        cleanup: true

